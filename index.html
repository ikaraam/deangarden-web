<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Deangarden</title>

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  min-height: 100%;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
  background: #071008;
  color: #fff;
}

.hero {
  position: relative;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
  overflow: hidden;
  text-align: center;
}

.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(rgba(6,12,8,0.34), rgba(6,12,8,0.54)),
    url("images/hero.png");
  background-size: cover;
  background-position: center;
  transform: scale(1.03);
  animation: slowZoom 70s ease-in-out infinite alternate;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, rgba(255,255,255,0.04), rgba(0,0,0,0.28));
}

.content {
  position: relative;
  z-index: 1;
  max-width: 980px;
  transform: translateY(-35px);
  animation: fadeIn 1.2s ease-out both;
}

.brand {
  font-family: Georgia, "Times New Roman", serif;
  font-size: clamp(4rem, 10vw, 8.5rem);
  font-weight: 400;
  letter-spacing: 0.16em;
  line-height: 0.95;
  margin: 0;
  text-transform: uppercase;
}

.field {
  margin-top: 24px;
  font-size: 1.15rem;
  letter-spacing: 0.42em;
  color: #c2d9aa;
  font-weight: 500;
  text-transform: uppercase;
}

.divider {
  width: 150px;
  height: 1px;
  background: rgba(194,217,170,0.78);
  margin: 24px auto;
}

.mission {
  max-width: 560px;
  margin: 0 auto;
  font-size: clamp(1.08rem, 2vw, 1.35rem);
  line-height: 1.6;
  color: #f1f5ed;
}

.actions {
  margin-top: 42px;
}

.button {
  display: inline-block;
  padding: 20px 54px;
  border: 1px solid rgba(220,238,210,0.78);
  border-radius: 40px;
  color: #fff;
  text-decoration: none;
  font-size: 1rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  backdrop-filter: blur(8px);
  background: rgba(10,30,14,0.25);
  transition: all 0.35s ease;
}

.button:hover {
  background: white;
  color: #132114;
  transform: translateY(-2px);
  box-shadow: 0 12px 35px rgba(0,0,0,0.35);
}

.footer {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 18px;
  z-index: 2;
  text-align: center;
  font-size: 0.72rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(238,246,231,0.52);
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(-18px);
  }
  to {
    opacity: 1;
    transform: translateY(-35px);
  }
}

@keyframes slowZoom {
  from { transform: scale(1.03); }
  to { transform: scale(1.08); }
}

@media (max-width: 640px) {
  .hero {
    padding: 40px 18px;
  }

  .content {
    transform: translateY(-25px);
  }

  .brand {
    font-size: clamp(2.65rem, 13vw, 3.9rem);
    letter-spacing: 0.075em;
  }

  .field {
    margin-top: 22px;
    font-size: 0.82rem;
    letter-spacing: 0.22em;
  }

  .divider {
    margin: 22px auto;
    width: 120px;
  }

  .mission {
    max-width: 92%;
    font-size: 1.15rem;
    line-height: 1.55;
  }

  .actions {
    margin-top: 38px;
  }

  .button {
    padding: 19px 50px;
    font-size: 0.95rem;
    letter-spacing: 0.24em;
  }

  .footer {
    display: none;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(-8px);
    }
    to {
      opacity: 1;
      transform: translateY(-25px);
    }
  }
}
</style>
</head>

<body>
  <main class="hero">
    <section class="content">
      <h1 class="brand">Deangarden</h1>

      <div class="field">Landscape Intelligence</div>

      <div class="divider"></div>

      <p class="mission">
        Building landscape intelligence through AI, robotics and digital twins.
      </p>

      <div class="actions">
        <a class="button" href="/connect.html">Connect</a>
      </div>
    </section>
  </main>

  <div class="footer">
    © 2026 Deangarden · Buckinghamshire, United Kingdom
  </div>
</body>
</html>
