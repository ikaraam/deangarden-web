<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Deangarden</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  min-height: 100%;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
  background: #071008;
  color: #fff;
}

.hero {
  position: relative;
  min-height: 100svh;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  padding: 12vh 28px 56px;
  overflow: hidden;
  text-align: center;
}

.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(rgba(5,10,6,0.34), rgba(5,10,6,0.58)),
    url("images/hero.png");
  background-size: cover;
  background-position: center;
  transform: scale(1.03);
  animation: slowZoom 80s ease-in-out infinite alternate;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at center, rgba(255,255,255,0.05), rgba(0,0,0,0.32)),
    linear-gradient(to bottom, rgba(0,0,0,0.18), rgba(0,0,0,0.08) 45%, rgba(0,0,0,0.40));
}

.content {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 1100px;
  margin-left: auto;
  margin-right: auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  transform: translate(70px, -20px);
  animation: fadeIn 1.2s ease-out both;
}

.brand {
  font-family: Georgia, "Times New Roman", serif;
  font-size: clamp(5rem, 8vw, 8rem);
  font-weight: 400;
  letter-spacing: 0.22em;
  line-height: 0.95;
  margin: 0;
  text-transform: uppercase;
  white-space: nowrap;
}

.field {
  margin-top: 24px;
  font-size: 1.05rem;
  letter-spacing: 0.45em;
  color: #c2d9aa;
  font-weight: 500;
  text-transform: uppercase;
}

.divider {
  width: 150px;
  height: 1px;
  background: rgba(194,217,170,0.82);
  margin: 26px auto 28px;
}

.mission {
  max-width: 700px;
  margin: 0 auto;
  font-size: 1.45rem;
  line-height: 1.65;
  color: #f3f6ef;
}

.actions {
  margin-top: 48px;
}

.button {
  display: inline-block;
  padding: 19px 56px;
  min-width: 270px;
  border: 1px solid rgba(220,238,210,0.82);
  border-radius: 999px;
  color: #fff;
  text-decoration: none;
  font-size: 1rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  backdrop-filter: blur(8px);
  background: rgba(10,30,14,0.28);
  transition: all 0.35s ease;
}

.button:hover {
  background: white;
  color: #132114;
  transform: translateY(-2px);
  box-shadow: 0 12px 35px rgba(0,0,0,0.35);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translate(70px, -5px); }
  to { opacity: 1; transform: translate(70px, -20px); }
}

@keyframes slowZoom {
  from { transform: scale(1.03); }
  to { transform: scale(1.08); }
}

@media (max-width: 760px) {
  .hero {
    align-items: center;
    justify-content: center;
    padding: 78px 34px 140px;
  }

  .content {
    max-width: 340px;
    transform: translateY(-8px);
  }

  .brand {
    font-size: clamp(2.15rem, 10.8vw, 3.35rem);
    letter-spacing: 0.105em;
  }

  .field {
    margin-top: 26px;
    font-size: 0.78rem;
    letter-spacing: 0.25em;
  }

  .divider {
    width: 120px;
    margin: 24px auto 30px;
  }

  .mission {
    max-width: 330px;
    font-size: 1.28rem;
    line-height: 1.58;
  }

  .actions {
    margin-top: 38px;
  }

  .button {
    min-width: 270px;
    padding: 20px 42px;
    font-size: 0.95rem;
    letter-spacing: 0.24em;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(-8px); }
  }
}

@media (max-width: 390px) {
  .hero {
    padding-left: 26px;
    padding-right: 26px;
  }

  .brand {
    font-size: 2.55rem;
    letter-spacing: 0.08em;
  }

  .mission {
    font-size: 1.18rem;
  }

  .button {
    min-width: 250px;
  }
}
</style>
</head>

<body>
  <main class="hero">
    <section class="content">
      <h1 class="brand">Deangarden</h1>

      <div class="field">Landscape Intelligence</div>

      <div class="divider"></div>

      <p class="mission">
        Building landscape intelligence through AI, robotics and digital twins.
      </p>

      <div class="actions">
        <a class="button" href="/connect.html">Connect</a>
      </div>
    </section>
  </main>
</body>
</html>
